<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | St. Jude</title>
    <link rel="stylesheet" href="css/styles.css" type="text/css">
</head>
<body>
    <header>
        <img src="images/volo_0032_st-judes.webp" alt="St. Jude logo">
        <h1>St. Jude Children’s Research Hospital</h1>
        <p>Saving lives, inspiring hope</p>
        <div id="navbar"></div>
    </header>

    <main>
        <section>
            <h2>Contact Us</h2>

            <div class="slideshow js-slideshow" aria-label="Image slideshow">
                <div class="slides">
                    <div class="slide"><img src="images/volo_0032_st-judes.webp" alt="St. Jude logo"></div>
                    <div class="slide"><img src="images/S.t Jude Building.jpg" alt="St. Jude building"></div>
                    <div class="slide"><img src="images/image jude.jpg.png" alt="Team"></div>
                </div>
                <button class="prev" aria-label="Previous slide">‹</button>
                <button class="next" aria-label="Next slide">›</button>
                <div class="dots"></div>
            </div>

            <p>Call: +1 901-595-3300</p>
            <p>Email: together@stjude.org</p>

            <form action="mailto:together@stjude.org" method="post" enctype="text/plain">
                <label for="name">Full name</label><br>
                <input type="text" id="name" name="name" required><br>
                <label for="email">Email address</label><br>
                <input type="email" id="email" name="email" required><br>
                <label for="msg">Message</label><br>
                <textarea id="msg" name="message" rows="5" cols="50" required></textarea><br>
                <input type="submit" value="Send">
            </form>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d104329.55804231571!2d-90.0173989107538!3d35.19902831565901!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87d57ef3e3b0ef11%3A0xa032ad390adad711!2sSt.%20Jude%20Children%27s%20Research%20Hospital!5e0!3m2!1sen!2sza!4v1776754133949!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </main>

    <footer>
        <p>All rights reserved for St. Jude Children’s Research Hospital NPO &copy;</p>
        <p>Email: together@stjude.org</p>
        <p>Call: +1 901-595-3300</p>
        <p class="social-label">Follow us:</p>
         <img src="images/facebook logo.png" alt="facebook logo" class="social-link facebook">
         <img src="images/instagram logo.png" alt="instagram logo" class="social-link instagram">
          <img src="images/tiktok-logo-94.png" alt="tiktok-logo-94" class="social-link tiktok">
           <img src="images/twitter-logo.gif" alt="twitter-logo" class="social-link twitter">

        <div class="social-links">
         
    </footer>
    <script src="javascript/navbar.js"></script>
    <script src="javascript/slideshow.js"></script>
</body>
</html>
